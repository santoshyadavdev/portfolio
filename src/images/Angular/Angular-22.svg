<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533"/>
      <stop offset="50%" style="stop-color:#2d1b69"/>
      <stop offset="100%" style="stop-color:#0f0720"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dd0031"/>
      <stop offset="100%" style="stop-color:#c3002f"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c4dff"/>
      <stop offset="100%" style="stop-color:#448aff"/>
    </linearGradient>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#7c4dff" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="0" x2="1200" y2="0"/><line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="360" x2="1200" y2="360"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="480" x2="1200" y2="480"/><line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
  </g>

  <!-- Ambient glow behind shield -->
  <ellipse cx="340" cy="280" rx="180" ry="180" fill="#E40035" opacity="0.12" filter="url(#softGlow)"/>

  <!-- Angular Logo (official from angular.dev) -->
  <g transform="translate(228, 140) scale(1.0)" filter="url(#neonGlow)">
    <defs>
      <linearGradient id="angGrad1" x1="49.009" x2="225.829" y1="213.75" y2="129.722" gradientUnits="userSpaceOnUse">
        <stop stop-color="#E40035"/>
        <stop offset=".24" stop-color="#F60A48"/>
        <stop offset=".352" stop-color="#F20755"/>
        <stop offset=".494" stop-color="#DC087D"/>
        <stop offset=".745" stop-color="#9717E7"/>
        <stop offset="1" stop-color="#6C00F5"/>
      </linearGradient>
      <linearGradient id="angGrad2" x1="41.025" x2="156.741" y1="28.344" y2="160.344" gradientUnits="userSpaceOnUse">
        <stop stop-color="#FF31D9"/>
        <stop offset="1" stop-color="#FF5BE1" stop-opacity="0"/>
      </linearGradient>
      <clipPath id="angClip"><path fill="#fff" d="M0 0h223v236H0z"/></clipPath>
    </defs>
    <g clip-path="url(#angClip)">
      <path fill="url(#angGrad1)" d="m222.077 39.192-8.019 125.923L137.387 0l84.69 39.192Zm-53.105 162.825-57.933 33.056-57.934-33.056 11.783-28.556h92.301l11.783 28.556ZM111.039 62.675l30.357 73.803H80.681l30.358-73.803ZM7.937 165.115 0 39.192 84.69 0 7.937 165.115Z"/>
      <path fill="url(#angGrad2)" d="m222.077 39.192-8.019 125.923L137.387 0l84.69 39.192Zm-53.105 162.825-57.933 33.056-57.934-33.056 11.783-28.556h92.301l11.783 28.556ZM111.039 62.675l30.357 73.803H80.681l30.358-73.803ZM7.937 165.115 0 39.192 84.69 0 7.937 165.115Z"/>
    </g>
  </g>

  <!-- Version number 22 -->
  <text x="340" y="450" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle" filter="url(#textGlow)">22</text>

  <!-- Neon accent line -->
  <g filter="url(#neonGlow)">
    <line x1="500" y1="160" x2="500" y2="460" stroke="#448aff" stroke-width="3" opacity="0.8"/>
  </g>

  <!-- Right side text -->
  <g transform="translate(570, 220)">
    <text font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="bold" fill="#b388ff" letter-spacing="4">ANGULAR</text>
    <text y="60" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="bold" fill="white">The Signals</text>
    <text y="120" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="bold" fill="white">Are Strong</text>
    <text y="175" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#b0bec5">OnPush Default • Signal Forms • @Service</text>
    <text y="205" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#b0bec5">linkedSignal • injectAsync • TypeScript 6</text>
  </g>

  <!-- Signal wave decoration -->
  <g transform="translate(570, 450)" opacity="0.6" filter="url(#neonGlow)">
    <path d="M0,0 Q30,-20 60,0 Q90,20 120,0 Q150,-20 180,0 Q210,20 240,0 Q270,-20 300,0 Q330,20 360,0 Q390,-20 420,0 Q450,20 480,0 Q510,-20 540,0" fill="none" stroke="#7c4dff" stroke-width="2.5"/>
    <path d="M0,15 Q30,-5 60,15 Q90,35 120,15 Q150,-5 180,15 Q210,35 240,15 Q270,-5 300,15 Q330,35 360,15 Q390,-5 420,15 Q450,35 480,15 Q510,-5 540,15" fill="none" stroke="#448aff" stroke-width="2" opacity="0.5"/>
  </g>
</svg>
